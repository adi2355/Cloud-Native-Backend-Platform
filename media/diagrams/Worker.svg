
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Backend Asynchronous Architecture</title>
  <desc id="desc">Comprehensive backend async architecture accurately separating the BullMQ job processing subsystem from the Transactional Outbox projection pipeline.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    
    <marker id="arrow-blue" markerWidth="7" markerHeight="7" refX="6.3" refY="3.5" orient="auto">
      <path d="M0,0.7 L7,3.5 L0,6.3 Z" fill="#60A5FA"/>
    </marker>
    <marker id="arrow-purple" markerWidth="7" markerHeight="7" refX="6.3" refY="3.5" orient="auto">
      <path d="M0,0.7 L7,3.5 L0,6.3 Z" fill="#A78BFA"/>
    </marker>
    <marker id="arrow-teal" markerWidth="7" markerHeight="7" refX="6.3" refY="3.5" orient="auto">
      <path d="M0,0.7 L7,3.5 L0,6.3 Z" fill="#34D399"/>
    </marker>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <style>
      .title { font: 700 28px Inter, -apple-system, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 400 15px Inter, -apple-system, sans-serif; fill: #94A3B8; }
      .laneTitle { font: 700 20px Inter, -apple-system, sans-serif; fill: #F8FAFC; }
      .laneSub { font: 400 14px Inter, -apple-system, sans-serif; fill: #94A3B8; }
      .colHeader { font: 700 16px Inter, -apple-system, sans-serif; fill: #E2E8F0; }
      .cardTitle { font: 700 14px Inter, -apple-system, sans-serif; fill: #F8FAFC; }
      .cardMeta { font: 400 12px Inter, -apple-system, sans-serif; fill: #CBD5E1; }
      .codeLabel { font: 600 12px "JetBrains Mono", monospace; fill: #38BDF8; }
      .smallBadge { font: 600 10px Inter, -apple-system, sans-serif; letter-spacing: 0.05em; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1100" rx="24" fill="url(#bg)"/>
  <rect x="32" y="32" width="1536" height="1036" rx="20" fill="none" stroke="#1E293B"/>

  <!-- Main Title -->
  <text x="64" y="80" class="title">Backend Asynchronous Architecture · Dual Execution Pipelines</text>
  <text x="64" y="106" class="subtitle">Accurate separation of the BullMQ job-queue subsystem and the event-driven Transactional Outbox / Projection pipeline.</text>

  <!-- Legend -->
  <rect x="1300" y="32" width="268" height="96" rx="12" fill="rgba(15, 23, 42, 0.8)" stroke="#334155"/>
  <text x="1320" y="56" class="colHeader">Arrow Reference Guide</text>
  
  <path d="M 1320 76 L 1360 76" stroke="#60A5FA" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="1375" y="80" class="cardMeta">Producer / Job Enqueue</text>
  
  <path d="M 1320 96 L 1360 96" stroke="#A78BFA" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="1375" y="100" class="cardMeta">Consumer / Execution Flow</text>

  <path d="M 1320 116 L 1360 116" stroke="#34D399" stroke-width="2" fill="none" marker-end="url(#arrow-teal)"/>
  <text x="1375" y="120" class="cardMeta">Data Store Mutation / Read</text>


  <!-- ========================================================= -->
  <!-- LANE 1: BULLMQ JOB-PROCESSING SUBSYSTEM                   -->
  <!-- ========================================================= -->
  <rect x="32" y="140" width="1536" height="500" rx="16" fill="none" stroke="#1E293B" stroke-dasharray="8,4"/>
  <text x="64" y="170" class="laneTitle">BullMQ Job-Processing Subsystem</text>
  <text x="64" y="190" class="laneSub">Queue-backed background jobs for health ingest, telemetry compute, analytics refreshes, and database cleanup operations.</text>

  <!-- Lane 1 Columns Backgrounds -->
  <rect x="64" y="210" width="320" height="410" rx="16" fill="rgba(30, 41, 59, 0.3)" stroke="#334155"/>
  <rect x="424" y="210" width="280" height="410" rx="16" fill="rgba(30, 41, 59, 0.3)" stroke="#334155"/>
  <rect x="744" y="210" width="420" height="410" rx="16" fill="rgba(30, 41, 59, 0.3)" stroke="#334155"/>
  <rect x="1204" y="210" width="332" height="410" rx="16" fill="rgba(30, 41, 59, 0.3)" stroke="#334155"/>

  <!-- Lane 1 Column Headers -->
  <text x="84" y="234" class="colHeader">1. Web Service (Producers)</text>
  <text x="444" y="234" class="colHeader">2. Queue Broker</text>
  <text x="764" y="234" class="colHeader">3. Worker Service (Consumers)</text>
  <text x="1224" y="234" class="colHeader">4. Execution Targets</text>

  <!-- Lane 1 / Col 1: Web Service -->
  <g filter="url(#shadow)">
    <rect x="84" y="260" width="280" height="60" rx="12" fill="#0F172A" stroke="#3B82F6"/>
  </g>
  <rect x="94" y="270" width="4" height="40" rx="2" fill="#60A5FA"/>
  <text x="108" y="284" class="cardTitle">API Controllers</text>
  <text x="108" y="304" class="cardMeta">Handle sync HTTP/WS traffic</text>

  <g filter="url(#shadow)">
    <rect x="84" y="340" width="280" height="60" rx="12" fill="#0F172A" stroke="#3B82F6"/>
  </g>
  <rect x="94" y="350" width="4" height="40" rx="2" fill="#60A5FA"/>
  <text x="108" y="364" class="codeLabel">HealthIngestQueueService</text>
  <text x="108" y="384" class="cardMeta">Producer for large health batches</text>

  <g filter="url(#shadow)">
    <rect x="84" y="420" width="280" height="60" rx="12" fill="#0F172A" stroke="#3B82F6"/>
  </g>
  <rect x="94" y="430" width="4" height="40" rx="2" fill="#60A5FA"/>
  <text x="108" y="444" class="codeLabel">SessionTelemetryQueueService</text>
  <text x="108" y="464" class="cardMeta">Producer for async compute</text>

  <text x="224" y="520" class="cardMeta" text-anchor="middle" fill="#94A3B8">(Queues initialized, workers disabled in web mode)</text>

  <!-- Lane 1 / Col 2: Queue Broker -->
  <g filter="url(#shadow)">
    <rect x="444" y="290" width="240" height="80" rx="12" fill="#0F172A" stroke="#F59E0B"/>
  </g>
  <rect x="454" y="300" width="4" height="60" rx="2" fill="#FDE68A"/>
  <text x="468" y="314" class="cardTitle">Dedicated BullMQ Redis</text>
  <text x="468" y="334" class="cardMeta">Central message broker</text>
  <text x="468" y="354" class="codeLabel" fill="#FDE68A">policy: noeviction</text>

  <g filter="url(#shadow)">
    <rect x="444" y="390" width="240" height="80" rx="12" fill="#0F172A" stroke="#F59E0B"/>
  </g>
  <rect x="454" y="400" width="4" height="60" rx="2" fill="#FDE68A"/>
  <text x="468" y="414" class="cardTitle">Queue Job States</text>
  <text x="468" y="434" class="cardMeta">waiting, active, delayed,</text>
  <text x="468" y="454" class="cardMeta">failed, completed</text>

  <!-- Lane 1 / Col 3: Worker Service -->
  <!-- Attached Scheduled Jobs Box — right-aligned above col 3 header -->
  <g filter="url(#shadow)">
    <rect x="980" y="158" width="180" height="42" rx="10" fill="#2E1065" stroke="#A78BFA"/>
  </g>
  <text x="1070" y="175" class="cardTitle" text-anchor="middle">Scheduled Jobs</text>
  <text x="1070" y="191" class="codeLabel" text-anchor="middle" fill="#E9D5FF">schedules.ts (Worker only)</text>

  <g filter="url(#shadow)">
    <rect x="764" y="250" width="380" height="44" rx="12" fill="#0F172A" stroke="#8B5CF6"/>
  </g>
  <rect x="774" y="256" width="4" height="32" rx="2" fill="#C4B5FD"/>
  <text x="788" y="268" class="codeLabel">worker.ts</text>
  <text x="788" y="284" class="cardMeta">Standalone Node.js Process</text>

  <g filter="url(#shadow)">
    <rect x="764" y="314" width="380" height="44" rx="12" fill="#0F172A" stroke="#8B5CF6"/>
  </g>
  <rect x="774" y="320" width="4" height="32" rx="2" fill="#C4B5FD"/>
  <text x="788" y="332" class="codeLabel">initializeServices()</text>
  <text x="788" y="348" class="cardMeta">mode='worker', enableWorkers=true</text>

  <g filter="url(#shadow)">
    <rect x="764" y="378" width="380" height="44" rx="12" fill="#0F172A" stroke="#8B5CF6"/>
  </g>
  <rect x="774" y="384" width="4" height="32" rx="2" fill="#C4B5FD"/>
  <text x="788" y="396" class="codeLabel">JobManagerService</text>
  <text x="788" y="412" class="cardMeta">Configures BullMQ queues &amp; workers</text>

  <g filter="url(#shadow)">
    <rect x="764" y="442" width="380" height="44" rx="12" fill="#0F172A" stroke="#8B5CF6"/>
  </g>
  <rect x="774" y="448" width="4" height="32" rx="2" fill="#C4B5FD"/>
  <text x="788" y="460" class="cardTitle">BullMQ Worker Instances</text>
  <text x="788" y="476" class="cardMeta">Pulls jobs (respects concurrency profiles)</text>

  <g filter="url(#shadow)">
    <rect x="764" y="506" width="380" height="44" rx="12" fill="#0F172A" stroke="#8B5CF6"/>
  </g>
  <rect x="774" y="512" width="4" height="32" rx="2" fill="#C4B5FD"/>
  <text x="788" y="524" class="codeLabel">JobProcessor</text>
  <text x="788" y="540" class="cardMeta">Dispatches execution by job type</text>

  <g filter="url(#shadow)">
    <rect x="764" y="570" width="380" height="60" rx="12" fill="#0F172A" stroke="#8B5CF6"/>
  </g>
  <rect x="774" y="580" width="4" height="40" rx="2" fill="#C4B5FD"/>
  <text x="788" y="590" class="cardTitle">Consumer Services</text>
  <text x="788" y="610" class="cardMeta">HealthSampleService, SessionTelemetry,</text>
  <text x="788" y="626" class="cardMeta">Analytics, Reconciliation Handlers</text>

  <!-- Lane 1 / Col 4: Targets -->
  <g filter="url(#shadow)">
    <rect x="1224" y="330" width="292" height="80" rx="12" fill="#0F172A" stroke="#10B981"/>
  </g>
  <rect x="1234" y="340" width="4" height="60" rx="2" fill="#34D399"/>
  <text x="1248" y="354" class="cardTitle">PostgreSQL Database</text>
  <text x="1248" y="374" class="cardMeta">Job execution &amp; business data state</text>
  <text x="1248" y="394" class="cardMeta">Mutated by consumer services</text>

  <g filter="url(#shadow)">
    <rect x="1224" y="430" width="292" height="80" rx="12" fill="#0F172A" stroke="#10B981"/>
  </g>
  <rect x="1234" y="440" width="4" height="60" rx="2" fill="#34D399"/>
  <text x="1248" y="454" class="cardTitle">External Systems</text>
  <text x="1248" y="474" class="cardMeta">S3 Blob Storage</text>
  <text x="1248" y="494" class="cardMeta">Anthropic API, external services</text>

  <!-- Lane 1 Flow Arrows -->
  <path d="M 224 320 L 224 336" stroke="#60A5FA" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 224 400 L 224 416" stroke="#60A5FA" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  
  <path d="M 364 370 L 402 370 L 402 330 L 440 330" stroke="#60A5FA" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 364 450 L 402 450 L 402 350 L 440 350" stroke="#60A5FA" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <path d="M 684 330 L 722 330 L 722 464 L 760 464" stroke="#A78BFA" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>

  <!-- Scheduled Jobs → worker.ts -->
  <path d="M 1070 200 L 1070 220 L 954 220 L 954 246" stroke="#A78BFA" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M 954 294 L 954 310" stroke="#A78BFA" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M 954 358 L 954 374" stroke="#A78BFA" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M 954 422 L 954 438" stroke="#A78BFA" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M 954 486 L 954 502" stroke="#A78BFA" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M 954 550 L 954 566" stroke="#A78BFA" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>

  <path d="M 1144 600 L 1182 600 L 1182 370 L 1220 370" stroke="#34D399" stroke-width="2" fill="none" marker-end="url(#arrow-teal)"/>
  <path d="M 1144 600 L 1182 600 L 1182 470 L 1220 470" stroke="#34D399" stroke-width="2" fill="none" marker-end="url(#arrow-teal)"/>


  <!-- ========================================================= -->
  <!-- LANE 2: TRANSACTIONAL OUTBOX / PROJECTION PIPELINE        -->
  <!-- ========================================================= -->
  <rect x="32" y="660" width="1536" height="420" rx="16" fill="none" stroke="#1E293B" stroke-dasharray="8,4"/>
  <text x="64" y="690" class="laneTitle">Transactional Outbox &amp; Projection Pipeline</text>
  <text x="64" y="710" class="laneSub">Event-driven dataflow for health projections, strictly decoupled from BullMQ job processing.</text>

  <!-- Lane 2 Columns Backgrounds -->
  <rect x="64" y="730" width="320" height="330" rx="16" fill="rgba(30, 41, 59, 0.3)" stroke="#334155"/>
  <rect x="424" y="730" width="280" height="330" rx="16" fill="rgba(30, 41, 59, 0.3)" stroke="#334155"/>
  <rect x="744" y="730" width="420" height="330" rx="16" fill="rgba(30, 41, 59, 0.3)" stroke="#334155"/>
  <rect x="1204" y="730" width="332" height="330" rx="16" fill="rgba(30, 41, 59, 0.3)" stroke="#334155"/>

  <!-- Lane 2 Column Headers -->
  <text x="84" y="754" class="colHeader">1. Web Service (Mutation)</text>
  <text x="444" y="754" class="colHeader">2. Event Store</text>
  <text x="764" y="754" class="colHeader">3. Worker Service (Event Consumer)</text>
  <text x="1224" y="754" class="colHeader">4. Read Models (Eventual Consistency)</text>

  <!-- Lane 2 / Col 1 -->
  <g filter="url(#shadow)">
    <rect x="84" y="780" width="280" height="60" rx="12" fill="#0F172A" stroke="#3B82F6"/>
  </g>
  <rect x="94" y="790" width="4" height="40" rx="2" fill="#60A5FA"/>
  <text x="108" y="804" class="codeLabel">HealthSampleService</text>
  <text x="108" y="824" class="cardMeta">Validates and normalizes raw data</text>

  <g filter="url(#shadow)">
    <rect x="84" y="860" width="280" height="80" rx="12" fill="#0F172A" stroke="#3B82F6"/>
  </g>
  <rect x="94" y="870" width="4" height="60" rx="2" fill="#60A5FA"/>
  <text x="108" y="884" class="cardTitle">Atomic DB Transaction</text>
  <text x="108" y="904" class="cardMeta">1. Mutates HealthSample records</text>
  <text x="108" y="924" class="cardMeta">2. Inserts outbox event</text>

  <!-- Lane 2 / Col 2 -->
  <g filter="url(#shadow)">
    <rect x="444" y="800" width="240" height="100" rx="12" fill="#0F172A" stroke="#F59E0B"/>
  </g>
  <rect x="454" y="810" width="4" height="80" rx="2" fill="#FDE68A"/>
  <text x="468" y="824" class="cardTitle">PostgreSQL DB</text>
  <text x="468" y="844" class="codeLabel" fill="#FDE68A">outbox_events table</text>
  <text x="468" y="864" class="cardMeta">Durable event persistence</text>
  <text x="468" y="884" class="cardMeta">Guarantees at-least-once delivery</text>

  <!-- Lane 2 / Col 3 -->
  <g filter="url(#shadow)">
    <rect x="764" y="770" width="380" height="60" rx="12" fill="#0F172A" stroke="#8B5CF6"/>
  </g>
  <rect x="774" y="780" width="4" height="40" rx="2" fill="#C4B5FD"/>
  <text x="788" y="794" class="codeLabel">OutboxProcessorService</text>
  <text x="788" y="814" class="cardMeta">Polls pending events, coalesces by user</text>

  <g filter="url(#shadow)">
    <rect x="764" y="850" width="380" height="80" rx="12" fill="#0F172A" stroke="#8B5CF6"/>
  </g>
  <rect x="774" y="860" width="4" height="60" rx="2" fill="#C4B5FD"/>
  <text x="788" y="874" class="codeLabel">HealthProjectionCoordinatorService</text>
  <text x="788" y="894" class="cardMeta">Orchestrates fanout, manages concurrency leases</text>
  <text x="788" y="914" class="cardMeta">Tracks ProjectionCheckpoint state</text>

  <g filter="url(#shadow)">
    <rect x="764" y="950" width="380" height="80" rx="12" fill="#0F172A" stroke="#8B5CF6"/>
  </g>
  <rect x="774" y="960" width="4" height="60" rx="2" fill="#C4B5FD"/>
  <text x="788" y="974" class="cardTitle">Projection Handlers</text>
  <text x="788" y="994" class="cardMeta">HealthRollup, SleepSummary, SessionImpact,</text>
  <text x="788" y="1014" class="cardMeta">ProductImpact, TelemetryCache</text>

  <!-- Lane 2 / Col 4 -->
  <g filter="url(#shadow)">
    <rect x="1224" y="780" width="292" height="80" rx="12" fill="#0F172A" stroke="#10B981"/>
  </g>
  <rect x="1234" y="790" width="4" height="60" rx="2" fill="#34D399"/>
  <text x="1248" y="804" class="cardTitle">Projection &amp; Read-Model Tables</text>
  <text x="1248" y="824" class="cardMeta">UserHealthRollupDay, SleepNightSummary, etc.</text>
  <text x="1248" y="844" class="cardMeta">Stores derived data &amp; sourceWatermark</text>

  <g filter="url(#shadow)">
    <rect x="1224" y="880" width="292" height="80" rx="12" fill="#0F172A" stroke="#10B981"/>
  </g>
  <rect x="1234" y="890" width="4" height="60" rx="2" fill="#34D399"/>
  <text x="1248" y="904" class="codeLabel">SessionTelemetryCache</text>
  <text x="1248" y="924" class="cardMeta">Explicit stale-marking path</text>
  <text x="1248" y="944" class="cardMeta">Triggers lazy recompute on next read</text>

  <!-- Lane 2 Flow Arrows -->
  <path d="M 224 840 L 224 856" stroke="#60A5FA" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 364 900 L 402 900 L 402 850 L 440 850" stroke="#60A5FA" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  
  <path d="M 684 850 L 722 850 L 722 800 L 760 800" stroke="#A78BFA" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>

  <path d="M 954 830 L 954 846" stroke="#A78BFA" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M 954 930 L 954 946" stroke="#A78BFA" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>

  <path d="M 1144 990 L 1182 990 L 1182 820 L 1220 820" stroke="#34D399" stroke-width="2" fill="none" marker-end="url(#arrow-teal)"/>
  <path d="M 1144 990 L 1182 990 L 1182 920 L 1220 920" stroke="#34D399" stroke-width="2" fill="none" marker-end="url(#arrow-teal)"/>

</svg>
