
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1620" viewBox="0 0 1200 1620" role="img" aria-labelledby="title desc">
  <title id="title">Health Data Ingestion Pipeline</title>
  <desc id="desc">Backend ingestion flow: Mobile client through trust validation, throughput routing, dual-layer idempotency, and transactional persistence to projection coordination.</desc>

  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="atomicGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#022C22"/>
    </linearGradient>
    <linearGradient id="mobileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,1 L10,6 L0,11 Z" fill="#94A3B8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,1 L10,6 L0,11 Z" fill="#10B981"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,1 L10,6 L0,11 Z" fill="#F59E0B"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,1 L10,6 L0,11 Z" fill="#8B5CF6"/>
    </marker>

    <!-- Drop Shadows & Glows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glowAtomic" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#10B981" flood-opacity="0.35"/>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#334155" opacity="0.3"/>
    </pattern>

    <style>
      .title { font: 700 32px Inter, -apple-system, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 400 16px Inter, -apple-system, sans-serif; fill: #94A3B8; }
      .groupLabel { font: 700 14px Inter, -apple-system, sans-serif; fill: #CBD5E1; letter-spacing: 0.05em; text-transform: uppercase; }
      .cardTitle { font: 700 15px Inter, -apple-system, sans-serif; fill: #F8FAFC; }
      .cardMeta { font: 400 13px Inter, -apple-system, sans-serif; fill: #94A3B8; }
      .codeText { font: 600 13px "JetBrains Mono", monospace; fill: #38BDF8; }
      .eventName { font: 700 13px "JetBrains Mono", monospace; fill: #D8B4FE; }
      .diamondText { font: 700 14px Inter, -apple-system, sans-serif; fill: #FEF3C7; text-anchor: middle; }
      .edgeLabel { font: 600 12px Inter, -apple-system, sans-serif; fill: #E2E8F0; }
      .dbLabel { font: 700 14px "JetBrains Mono", monospace; text-anchor: middle; }
      .respLabel { font: 700 12px Inter, -apple-system, sans-serif; letter-spacing: 0.03em; }
    </style>
  </defs>

  <!-- Base Layers -->
  <rect width="1200" height="1620" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="1620" fill="url(#grid)"/>
  <rect x="24" y="24" width="1152" height="1572" rx="20" fill="none" stroke="#1E293B" stroke-width="2"/>

  <!-- Header -->
  <text x="56" y="80" class="title">Health Data Ingestion Pipeline</text>
  <text x="56" y="108" class="subtitle">High-throughput validated gateway: Mobile Client → Trust Boundary → Router → Idempotent Persistence </text>

  <!-- Legend -->
  <g filter="url(#shadow)">
    <rect x="900" y="44" width="240" height="100" rx="12" fill="#0F172A" stroke="#334155"/>
    <text x="920" y="70" class="cardTitle">Flow Legend</text>
    <path d="M 920 85 L 950 85" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="960" y="89" class="cardSub">Data &amp; Control Flow</text>
    <path d="M 920 110 L 950 110" stroke="#10B981" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrowGreen)"/>
    <text x="960" y="114" class="cardSub">HTTP Responses</text>
  </g>

  <!-- ========================================================= -->
  <!-- 1. MOBILE CLIENT                                          -->
  <!-- ========================================================= -->

  <g filter="url(#shadow)">
    <rect x="475" y="140" width="250" height="60" rx="30" fill="url(#mobileGrad)" stroke="#3B82F6" stroke-width="2"/>
    <text x="600" y="176" text-anchor="middle" class="cardTitle">Mobile Client</text>
  </g>

  <!-- Main Ingress Arrow -->
  <path d="M 600 200 L 600 290" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- POST Label Pill -->
  <g filter="url(#shadow)">
    <rect x="440" y="220" width="320" height="36" rx="8" fill="#0F172A" stroke="#475569"/>
    <text x="455" y="243" class="codeText">POST</text>
    <text x="495" y="243" class="cardMeta" fill="#E2E8F0">/api/v1/health/samples/batch-upsert</text>
  </g>

  <!-- ========================================================= -->
  <!-- 2. TRUST BOUNDARY                                         -->
  <!-- ========================================================= -->

  <g filter="url(#shadow)">
    <rect x="360" y="280" width="480" height="340" rx="16" fill="rgba(30, 58, 138, 0.15)" stroke="#1D4ED8" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="380" y="310" class="groupLabel" fill="#93C5FD">Trust Boundary</text>
  </g>

  <!-- Step 1: API Gateway -->
  <g filter="url(#shadow)">
    <rect x="400" y="330" width="400" height="50" rx="10" fill="url(#cardGrad)" stroke="#475569"/>
    <rect x="400" y="330" width="6" height="50" rx="3" fill="#3B82F6"/>
    <text x="420" y="360" class="cardTitle">API Gateway &amp; Auth</text>
  </g>

  <path d="M 600 380 L 600 400" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 2: Zod Validation -->
  <g filter="url(#shadow)">
    <rect x="400" y="400" width="400" height="50" rx="10" fill="url(#cardGrad)" stroke="#475569"/>
    <rect x="400" y="400" width="6" height="50" rx="3" fill="#3B82F6"/>
    <text x="420" y="430" class="cardTitle">Zod Schema Validation</text>
    <text x="610" y="430" class="cardMeta">Strict contract enforcement</text>
  </g>

  <path d="M 600 450 L 600 470" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 3: Cryptographic Hash Check -->
  <g filter="url(#shadow)">
    <rect x="400" y="470" width="400" height="50" rx="10" fill="url(#cardGrad)" stroke="#475569"/>
    <rect x="400" y="470" width="6" height="50" rx="3" fill="#3B82F6"/>
    <text x="420" y="500" class="cardTitle">Cryptographic Hash Check</text>
    <text x="610" y="500" class="cardMeta">Verifies payload integrity</text>
  </g>

  <path d="M 600 520 L 600 540" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 4: Privacy Gating -->
  <g filter="url(#shadow)">
    <rect x="400" y="540" width="400" height="50" rx="10" fill="url(#cardGrad)" stroke="#EF4444"/>
    <rect x="400" y="540" width="6" height="50" rx="3" fill="#EF4444"/>
    <text x="420" y="570" class="cardTitle">Privacy &amp; Blocklist Gating</text>
    <text x="610" y="570" class="cardMeta">Filters unauthorized metrics</text>
  </g>

  <path d="M 600 590 L 600 660" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ========================================================= -->
  <!-- 3. THROUGHPUT ROUTER                                      -->
  <!-- ========================================================= -->

  <g filter="url(#shadow)">
    <rect x="250" y="650" width="700" height="280" rx="16" fill="rgba(180, 83, 9, 0.12)" stroke="#D97706" stroke-width="1.5"/>
    <text x="270" y="680" class="groupLabel" fill="#FCD34D">Throughput Router</text>
  </g>

  <!-- Decision Diamond -->
  <g filter="url(#shadow)">
    <polygon points="600,680 660,720 600,760 540,720" fill="#451A03" stroke="#F59E0B" stroke-width="2"/>
    <text x="600" y="716" class="diamondText">Batch</text>
    <text x="600" y="734" class="diamondText">Size?</text>
  </g>

  <!-- Left Branch (< 400) -->
  <path d="M 540 720 L 400 720 L 400 790" stroke="#94A3B8" stroke-width="2" fill="none" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <rect x="420" y="708" width="100" height="24" rx="12" fill="#0F172A" stroke="#475569"/>
  <text x="470" y="725" text-anchor="middle" class="edgeLabel">&lt; 400 samples</text>

  <!-- Right Branch (>= 400) -->
  <path d="M 660 720 L 800 720 L 800 790" stroke="#94A3B8" stroke-width="2" fill="none" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <rect x="680" y="708" width="100" height="24" rx="12" fill="#0F172A" stroke="#475569"/>
  <text x="730" y="725" text-anchor="middle" class="edgeLabel">≥ 400 samples</text>

  <!-- Inline Processing Card -->
  <g filter="url(#shadow)">
    <rect x="280" y="790" width="240" height="60" rx="12" fill="url(#cardGrad)" stroke="#10B981"/>
    <rect x="280" y="790" width="6" height="60" rx="3" fill="#10B981"/>
    <text x="300" y="816" class="cardTitle">Inline Processing</text>
    <text x="300" y="836" class="cardMeta">Synchronous, Low Latency</text>
  </g>

  <!-- BullMQ Queue Card -->
  <g filter="url(#shadow)">
    <rect x="680" y="790" width="240" height="60" rx="12" fill="url(#cardGrad)" stroke="#F59E0B"/>
    <rect x="680" y="790" width="6" height="60" rx="3" fill="#F59E0B"/>
    <text x="700" y="816" class="cardTitle">BullMQ Background Queue</text>
    <text x="700" y="836" class="cardMeta">Asynchronous, High Throughput</text>
  </g>

  <!-- Convergence Arrows -->
  <path d="M 400 850 L 400 890 L 600 890 L 600 950" stroke="#94A3B8" stroke-width="2" fill="none" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <path d="M 800 850 L 800 890 L 600 890" stroke="#94A3B8" stroke-width="2" fill="none" stroke-linejoin="round"/>

  <!-- ========================================================= -->
  <!-- RESPONSES (Upward Paths)                                  -->
  <!-- ========================================================= -->

  <!-- 200/207 Response from Inline -->
  <path d="M 300 790 L 300 170 Q 300 150 320 150 L 460 150" stroke="#10B981" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrowGreen)"/>
  <g filter="url(#shadow)">
    <rect x="180" y="440" width="140" height="30" rx="15" fill="#064E3B" stroke="#10B981"/>
    <text x="250" y="460" text-anchor="middle" class="respLabel" fill="#A7F3D0">200 / 207 Response</text>
  </g>

  <!-- 202 Accepted from BullMQ -->
  <path d="M 900 790 L 900 170 Q 900 150 880 150 L 740 150" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrowAmber)"/>
  <g filter="url(#shadow)">
    <rect x="830" y="440" width="140" height="30" rx="15" fill="#451A03" stroke="#F59E0B"/>
    <text x="900" y="460" text-anchor="middle" class="respLabel" fill="#FDE68A">202 Accepted</text>
  </g>

  <!-- ========================================================= -->
  <!-- 4. IDEMPOTENCY & PERSISTENCE                              -->
  <!-- ========================================================= -->

  <g filter="url(#shadow)">
    <rect x="250" y="940" width="700" height="380" rx="16" fill="rgba(17, 94, 89, 0.12)" stroke="#0F766E" stroke-width="1.5"/>
    <text x="270" y="970" class="groupLabel" fill="#2DD4BF">Idempotency &amp; Persistence</text>
  </g>

  <!-- Step 1: Idempotency Check -->
  <g filter="url(#shadow)">
    <rect x="350" y="990" width="500" height="50" rx="10" fill="url(#cardGrad)" stroke="#F59E0B"/>
    <rect x="350" y="990" width="6" height="50" rx="3" fill="#F59E0B"/>
    <text x="370" y="1020" class="cardTitle">Request Idempotency Check</text>
    <text x="590" y="1020" class="cardMeta">Dual-layer deduplication engine</text>
  </g>

  <path d="M 600 1040 L 600 1060" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 2: Normalization -->
  <g filter="url(#shadow)">
    <rect x="350" y="1060" width="500" height="50" rx="10" fill="url(#cardGrad)" stroke="#8B5CF6"/>
    <rect x="350" y="1060" width="6" height="50" rx="3" fill="#8B5CF6"/>
    <text x="370" y="1090" class="cardTitle">Unit &amp; TZ Normalization</text>
    <text x="590" y="1090" class="cardMeta">Canonical units, timezone resolution</text>
  </g>

  <path d="M 600 1110 L 600 1130" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 3: Atomic DB Transaction -->
  <g filter="url(#glowAtomic)">
    <rect x="350" y="1130" width="500" height="60" rx="12" fill="url(#atomicGrad)" stroke="#10B981" stroke-width="2"/>
    <text x="600" y="1166" text-anchor="middle" class="cardTitle" fill="#34D399" font-size="18px">Atomic Database Transaction</text>
  </g>

  <!-- Forks to Databases -->
  <path d="M 600 1190 L 600 1220 L 450 1220 L 450 1250" stroke="#94A3B8" stroke-width="2" fill="none" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <path d="M 600 1190 L 600 1220 L 750 1220 L 750 1250" stroke="#94A3B8" stroke-width="2" fill="none" stroke-linejoin="round" marker-end="url(#arrow)"/>

  <!-- Labels on Forks -->
  <rect x="410" y="1208" width="80" height="24" rx="12" fill="#0F172A" stroke="#475569"/>
  <text x="450" y="1224" text-anchor="middle" class="edgeLabel" fill="#10B981">UPSERT</text>
  
  <rect x="710" y="1208" width="80" height="24" rx="12" fill="#0F172A" stroke="#475569"/>
  <text x="750" y="1224" text-anchor="middle" class="edgeLabel" fill="#8B5CF6">INSERT</text>

  <!-- DB 1: health_samples -->
  <g filter="url(#shadow)">
    <path d="M 350 1270 V 1310 A 100 15 0 0 0 550 1310 V 1270" fill="#064E3B" stroke="#10B981" stroke-width="1.5"/>
    <ellipse cx="450" cy="1270" rx="100" ry="15" fill="#022C22" stroke="#10B981" stroke-width="1.5"/>
    <text x="450" y="1300" class="dbLabel" fill="#A7F3D0">health_samples</text>
  </g>

  <!-- DB 2: outbox_events -->
  <g filter="url(#shadow)">
    <path d="M 650 1270 V 1310 A 100 15 0 0 0 850 1310 V 1270" fill="#2E1065" stroke="#8B5CF6" stroke-width="1.5"/>
    <ellipse cx="750" cy="1270" rx="100" ry="15" fill="#1E0A3A" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="750" y="1300" class="dbLabel" fill="#D8B4FE">outbox_events</text>
  </g>

  <!-- ========================================================= -->
  <!-- 5. DOWNSTREAM / EVENT HANDOFF                             -->
  <!-- ========================================================= -->

  <!-- Arrow from Outbox to Coordinator -->
  <path d="M 750 1325 L 750 1400 Q 750 1420 730 1420 L 620 1420 Q 600 1420 600 1440 L 600 1470" stroke="#8B5CF6" stroke-width="2.5" fill="none" marker-end="url(#arrowPurple)"/>

  <!-- Event Pill -->
  <g filter="url(#shadow)">
    <rect x="635" y="1404" width="220" height="32" rx="16" fill="#1E1B4B" stroke="#6D28D9"/>
    <text x="745" y="1425" text-anchor="middle" class="eventName">health.samples.changed</text>
  </g>

  <!-- Projection Coordinator Card -->
  <g filter="url(#shadow)">
    <rect x="440" y="1480" width="320" height="60" rx="12" fill="url(#cardGrad)" stroke="#A78BFA"/>
    <rect x="440" y="1480" width="6" height="60" rx="3" fill="#8B5CF6"/>
    <text x="465" y="1506" class="cardTitle">Projection Coordinator</text>
    <text x="465" y="1526" class="cardMeta">Fanout to derived read models</text>
  </g>

</svg>
